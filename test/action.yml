name: 'test'
description: 'Run full test suite with dependencies'
author: 'tty-pt'

inputs:
  deps:
    description: 'Generic dependency list'
    required: false
    default: ''
  deps_deb:
    description: 'Debian dependency list'
    required: false
    default: ''
  setup:
    description: 'Optional shell setup command to run before build/test'
    required: false
    default: ''
  build:
    description: 'Build command'
    required: false
    default: 'make'
  command:
    description: 'Test command'
    required: false
    default: 'make test'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4

    - name: Configure tty.pt APT repo
      shell: sh
      run: |
        echo "deb [trusted=yes] http://tty.pt/deb stable main" | sudo tee /etc/apt/sources.list.d/ttypt.list
        sudo apt-get update -y || true

    - name: Install dependencies
      shell: sh
      run: |
        deps="${{ inputs.deps_deb || inputs.deps }}"
        echo "Installing: $deps"
        sudo rm -f /var/lib/man-db/auto-update
        if [ -n "$deps" ]; then
          sudo apt-get install -y $(echo "$deps" | tr ',' ' ')
        fi

    - name: Fetch mk includes
      shell: sh
      run: git clone --branch main https://github.com/tty-pt/mk ../mk

    - name: Test setup
      if: inputs.setup != ''
      shell: sh
      run: ${{ inputs.setup }}

    - name: Build and test
      shell: sh
      run: |
        ${{ inputs.build }}
        export LD_LIBRARY_PATH=$PWD/lib:${LD_LIBRARY_PATH}
        ${{ inputs.command }}
